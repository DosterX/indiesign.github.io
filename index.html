<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S. TORRES | Operaciones Estratégicas</title>
    <style>
        :root {
            --fondo-profundo: #050505;
            --vidrio: rgba(255, 255, 255, 0.05);
            --borde: rgba(255, 255, 255, 0.1);
            --acento: #00d4ff; /* Cambiamos a un azul cian táctico para un look más profesional */
            --texto: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--fondo-profundo); color: var(--texto); line-height: 1.6; }

        header {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4)), url('simulador.jpeg');
            background-size: cover; background-position: center; border-bottom: 1px solid var(--borde);
        }

        h1 { font-size: 4rem; text-transform: uppercase; letter-spacing: 4px; }
        h1 span { color: var(--acento); }
        
        section { padding: 100px 20px; max-width: 1000px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .card { 
            background: var(--vidrio); backdrop-filter: blur(10px); border: 1px solid var(--borde);
            padding: 30px; border-radius: 15px; transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--acento); }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 20px; filter: grayscale(50%); }

        .btn-correo {
            display: inline-block; background: var(--acento); color: #000; padding: 15px 40px;
            text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 20px;
            transition: opacity 0.3s;
        }
        .btn-correo:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <h1>Indie <span>Sign</span></h1>
        <p>Ingeniería de Alta Fidelidad | Estrategia Táctica</p>
    </header>

    <section>
        <div class="grid">
            <div class="card">
                <img src="indie.jpeg" alt="Indie">
                <h3>Indie Sign</h3>
                <p>Arquitectura de software escalable.</p>
            </div>
            <div class="card">
                <img src="macro.jpeg" alt="Macro">
                <h3>Macro Cosmo</h3>
                <p>Diseño de interfaces humanas.</p>
            </div>
        </div>
    </section>

    <section style="text-align: center;">
        <h2>Comando Central</h2>
        <p>Solicitud de contacto directo para operaciones críticas.</p>
        <!-- AQUÍ ESTÁ TU BOTÓN DE CORREO -->
        <a href="mailto: studiomusimx@gmail.com?subject=Solicitud de Contacto - Expo InfoSecurity" class="btn-correo">Enviar Correo Electrónico</a>
    </section>

</body>
</html>
